<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flower Identifier Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    <style>
        :root {
            --primary: #d23669;
            --primary-hover: #b82656;
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.03);
            text-align: center;
            transition: transform 0.3s ease;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 8px;
            color: #1a1a1a;
            font-weight: 800;
        }

        h1 span {
            color: var(--primary);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 1rem;
        }

        /* Beautiful Custom Upload Button */
        .file-upload-wrapper {
            position: relative;
            margin: 20px 0;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 12px 30px;
            background: #f0f2f5;
            color: var(--text-main);
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px dashed #cbd5e1;
        }

        .custom-file-upload:hover {
            background: #e2e8f0;
            border-color: var(--primary);
        }

        #preview {
            max-width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 16px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            display: none;
        }

        #status-box {
            margin-top: 25px;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 12px;
            background: #f8fafc;
        }

        /* ✨ Animated Flashcard Styles ✨ */
        .flashcard {
            display: none;
            margin-top: 30px;
            background: linear-gradient(145deg, #ffffff, #f5f7fa);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            box-shadow: 0 10px 25px rgba(210, 54, 105, 0.15);
            border-left: 6px solid var(--primary);
            animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .flashcard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .flashcard-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--primary);
            margin: 0;
        }

        .badge {
            background: rgba(210, 54, 105, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .info-row {
            margin-bottom: 12px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .info-label {
            font-weight: 700;
            color: #4a5568;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .info-value {
            color: #2d3748;
            margin-left: 22px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🌸 Flower<span>ID</span></h1>
    <p class="subtitle">Snap or upload a photo to discover its botanical story</p>
    
    <div class="file-upload-wrapper">
        <label for="imageSelector" class="custom-file-upload">
            📸 Choose Flower Photo
        </label>
        <input type="file" id="imageSelector" accept="image/*">
    </div>
    
    <img id="preview" alt="Flower Preview">
    
    <div id="status-box">Waking up AI Brain...</div>

    <div id="flowerCard" class="flashcard">
        <div class="flashcard-header">
            <h3 id="cardTitle" class="flashcard-title">Flower Name</h3>
            <span class="badge">Match Found</span>
        </div>
        
        <div class="info-row">
            <div class="info-label">✨ Meaning & Symbolism</div>
            <div id="cardMeaning" class="info-value">Loading...</div>
        </div>
        
        <div class="info-row">
            <div class="info-label">💡 Fun Fact</div>
            <div id="cardFact" class="info-value">Loading...</div>
        </div>
        
        <div class="info-row">
            <div class="info-label">💧 Plant Care Tip</div>
            <div id="cardCare" class="info-value">Loading...</div>
        </div>
    </div>
</div>

<script>
    let session;
    let labels;

    // 📚 Beautiful custom knowledge database for our 3 target classes
    const flowerDatabase = {
        "Daisy": {
            meaning: "Innocence, loyal love, and pure new beginnings.",
            fact: "Daisies are actually two flowers in one! The outer petals are one flower, and the center yellow disc cluster is another.",
            care: "Thrives in full sun. Water evenly once a week; allow soil to dry slightly between waterings."
        },
        "Dandelion": {
            meaning: "Hope, resilience, healing, and warmth of the rising sun.",
            fact: "Every single part of a dandelion is completely edible—from the roots all the way up to the bright yellow petals!",
            care: "Extremely tough. Requires minimal care, loves open sunlight, and tolerates almost any soil type."
        },
        "Rose": {
            meaning: "Romance, deep passionate love, courage, and timeless beauty.",
            fact: "Fossil evidence shows that wild roses have existed on Earth for over 35 million years!",
            care: "Requires 6+ hours of direct sunlight. Water deeply at the base of the plant to prevent leaf disease."
        }
    };

    // Start App & Initialize Model Configuration
    async function startApp() {
        try {
            labels = await (await fetch('labels.json')).json();
            session = await ort.InferenceSession.create('./flower_model.onnx');
            document.getElementById('status-box').innerText = "AI Loaded. Drop a picture anytime!";
        } catch (e) {
            document.getElementById('status-box').innerText = "Initialization Failed.";
            console.error(e);
        }
    }

    // Handle uploaded file stream
    document.getElementById('imageSelector').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() {
                // Show clean UI element states
                document.getElementById('preview').src = event.target.result;
                document.getElementById('preview').style.display = 'inline-block';
                document.getElementById('status-box').innerText = "Analyzing flower features...";
                document.getElementById('flowerCard').style.display = 'none'; // Hide old card while running
                
                runInference(img);
            }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    // Image Preprocessing Array calculations (64x64)
    function preprocess(img) {
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 64, 64);
        
        const imgData = ctx.getImageData(0, 0, 64, 64).data;
        const floatArray = new Float32Array(3 * 64 * 64);

        for (let i = 0; i < 64 * 64; i++) {
            let r = imgData[i * 4] / 255.0;
            let g = imgData[i * 4 + 1] / 255.0;
            let b = imgData[i * 4 + 2] / 255.0;

            floatArray[i] = (r - 0.5) / 0.5;
            floatArray[i + 64 * 64] = (g - 0.5) / 0.5;
            floatArray[i + 2 * 64 * 64] = (b - 0.5) / 0.5;
        }
        return new ort.Tensor('float32', floatArray, [1, 3, 64, 64]);
    }

    // Main AI Engine run logic
    async function runInference(img) {
        const inputTensor = preprocess(img);
        const outputs = await session.run({ input: inputTensor });
        const outputData = outputs.output.data;

        let maxIdx = 0;
        let maxVal = outputData[0];
        for(let i = 1; i < outputData.length; i++){
            if(outputData[i] > maxVal){
                maxVal = outputData[i];
                maxIdx = i;
            }
        }

        const flowerName = labels[maxIdx];
        document.getElementById('status-box').innerText = "Analysis Complete!";
        
        // Populate and display the flashcard interface on the same page
        showFlashcard(flowerName);
    }

    function showFlashcard(name) {
        const details = flowerDatabase[name];
        if (!details) return;

        // Injects dynamic content into card text placeholders
        document.getElementById('cardTitle').innerText = name;
        document.getElementById('cardMeaning').innerText = details.meaning;
        document.getElementById('cardFact').innerText = details.fact;
        document.getElementById('cardCare').innerText = details.care;

        // Triggers pop animation rendering
        const card = document.getElementById('flowerCard');
        card.style.display = 'block';
    }

    startApp();
</script>
</body>
</html>
